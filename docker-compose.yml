# Запуск в Colima: colima start && docker compose up --build
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GRADLE_BASE_IMAGE: ${GRADLE_BASE_IMAGE:-gradle:9.0.0-jdk21}
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:-eclipse-temurin:21-jre-alpine}
        ARTIFACTORY_USERNAME: ${ARTIFACTORY_USERNAME:-}
        ARTIFACTORY_PASSWORD: ${ARTIFACTORY_PASSWORD:-}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # LLM: передаются из окружения хоста или из .env (см. readme — запуск в Colima)
      - LLM_URL=${LLM_URL:-}
      - LLM_TOKEN=${LLM_TOKEN:-}
    volumes:
      # Используем БД с хоста (после seed: ./gradlew -p backend seed)
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4201:80"
    depends_on:
      - backend

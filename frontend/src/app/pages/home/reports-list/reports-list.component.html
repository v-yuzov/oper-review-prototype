<ng-template #errorDialog let-observer="$implicit" let-data="data">
  <p class="error-dialog__message">{{ data?.message ?? 'Не удалось удалить отчёт' }}</p>
  <button tuiButton appearance="primary" size="m" (click)="observer.next()">
    Понятно
  </button>
</ng-template>

<div class="reports-list">
  @if (loading) {
    <div class="loading-wrap" aria-busy="true">
      <tui-loader size="l" [showLoader]="true"></tui-loader>
      <span class="loading-label">Загрузка…</span>
    </div>
  } @else if (error) {
    <p class="error">{{ error }}</p>
  } @else {
    <div class="reports-list__actions">
      <a [routerLink]="['/unit', unitId, 'report', 'new']" tuiButton appearance="primary" size="s">
        Создать отчёт
      </a>
    </div>
    @if (reports.length === 0) {
      <p class="tab-panel--empty">Нет отчётов. Создайте первый отчёт.</p>
    } @else {
      <ul class="reports-list__items">
        @for (r of reports; track r.id) {
          <li class="reports-list__item">
            <div class="reports-list__card-wrap" tuiSurface>
              <a [routerLink]="['/unit', unitId, 'report', r.id]" class="reports-list__card">
                <span class="reports-list__card-label">{{ formatDate(r.reportDate) }}</span>
                <span class="reports-list__card-chevron" aria-hidden="true"></span>
              </a>
              <button
              type="button"
              class="reports-list__delete"
              (click)="deleteReport($event, r.id)"
              [attr.aria-label]="'Удалить отчёт от ' + formatDate(r.reportDate)"
              [disabled]="deletingId === r.id"
              tuiButton
              appearance="flat"
              size="s"
            >
              <svg class="reports-list__delete-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
            </button>
            </div>
          </li>
        }
      </ul>
    }
  }
</div>

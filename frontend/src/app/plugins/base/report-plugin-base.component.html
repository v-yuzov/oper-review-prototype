<div class="report-plugin">
  <header class="report-plugin__header">
    <h2 class="report-plugin__title">{{ label }}</h2>
    <span class="report-plugin__group">{{ groupLabel }}</span>
  </header>

  <!-- 1. Визуализация (заголовок и кнопка «Зафиксировать» в одну строку; у custom плагина кнопки нет) -->
  <section class="report-plugin__section" *ngIf="visualizationRef; else noVisualization">
    <div class="report-plugin__viz-head">
      <h3 class="report-plugin__section-title">Визуализация</h3>
      @if (pluginId !== 'custom') {
        <button
          type="button"
          class="report-plugin__fix-btn"
          (click)="onFixChart()"
          [disabled]="fixingSnapshot()"
        >
          {{ fixingSnapshot() ? 'Фиксация…' : 'Зафиксировать' }}
        </button>
      }
    </div>
    <div class="report-plugin__viz" tuiSurface #vizContainer>
      <ng-container *ngTemplateOutlet="visualizationRef"></ng-container>
    </div>
  </section>
  <ng-template #noVisualization>
    <section class="report-plugin__section">
      <div class="report-plugin__viz-head">
        <h3 class="report-plugin__section-title">Визуализация</h3>
        @if (pluginId !== 'custom') {
          <button
            type="button"
            class="report-plugin__fix-btn"
            (click)="onFixChart()"
            [disabled]="fixingSnapshot()"
          >
            {{ fixingSnapshot() ? 'Фиксация…' : 'Зафиксировать' }}
          </button>
        }
      </div>
      <div class="report-plugin__viz report-plugin__viz--placeholder" tuiSurface #vizContainer>
        <p class="report-plugin__placeholder">Кастомная визуализация плагина (графики, чарты)</p>
      </div>
    </section>
  </ng-template>

  <!-- 2. Результат анализа от LLM (Markdown) + кнопка «Магия» (кроме custom) -->
  <section class="report-plugin__section">
    <div class="report-plugin__llm-head">
      <h3 class="report-plugin__section-title">Анализ данных (LLM)</h3>
      @if (pluginId !== 'custom') {
        <button
          type="button"
          class="report-plugin__magic-btn"
          (click)="onLlmMagic()"
          [disabled]="llmLoading()"
          [attr.aria-label]="'Запустить анализ через LLM'"
          title="Запустить анализ через LLM"
        >
          <svg class="report-plugin__magic-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/>
          </svg>
          {{ llmLoading() ? 'Анализ…' : 'Магия' }}
        </button>
      }
    </div>
    <div class="report-plugin__llm" tuiSurface>
      <div class="report-plugin__md">{{ data.llmMarkdown || '—' }}</div>
    </div>
  </section>

  <!-- 3. Анализ пользователя. Обычный textarea (без tuiTextarea), чтобы не требовать ControlContainer и не получать NG0201. -->
  <section class="report-plugin__section">
    <h3 class="report-plugin__section-title">Комментарий пользователя</h3>
    <textarea
      [value]="data.userAnalysis"
      (input)="onUserAnalysisChange($any($event.target).value)"
      placeholder="Введите ваш анализ..."
      class="report-plugin__user-input"
      rows="4"
    ></textarea>
  </section>

  <!-- 4. Оценка — светофор (зелёный / жёлтый / красный) -->
  <section class="report-plugin__section">
    <h3 class="report-plugin__section-title">Оценка</h3>
    <div class="report-plugin__rating" role="group" aria-label="Оценка">
      <button
        type="button"
        class="report-plugin__rating-btn report-plugin__rating-btn--green"
        [class.report-plugin__rating-btn--active]="ratingIndex === 0"
        (click)="onRatingIndexChange(0)"
        [attr.aria-pressed]="ratingIndex === 0"
      >
        <span class="report-plugin__rating-dot"></span>
        {{ ReportRatingLabel[ReportRating.Excellent] }}
      </button>
      <button
        type="button"
        class="report-plugin__rating-btn report-plugin__rating-btn--yellow"
        [class.report-plugin__rating-btn--active]="ratingIndex === 1"
        (click)="onRatingIndexChange(1)"
        [attr.aria-pressed]="ratingIndex === 1"
      >
        <span class="report-plugin__rating-dot"></span>
        {{ ReportRatingLabel[ReportRating.NeedsWork] }}
      </button>
      <button
        type="button"
        class="report-plugin__rating-btn report-plugin__rating-btn--red"
        [class.report-plugin__rating-btn--active]="ratingIndex === 2"
        (click)="onRatingIndexChange(2)"
        [attr.aria-pressed]="ratingIndex === 2"
      >
        <span class="report-plugin__rating-dot"></span>
        {{ ReportRatingLabel[ReportRating.Poor] }}
      </button>
    </div>
  </section>
</div>
